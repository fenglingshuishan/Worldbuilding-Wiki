<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>构界 · 世界观创作平台</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="#/">
          <span class="brand-mark" aria-hidden="true"><i></i><i></i></span>
          <span><strong>构界</strong><small>创作中枢</small></span>
        </a>
        <nav aria-label="主要导航">
          <a href="#/" data-nav="home"><span>01</span>创作总览</a>
          <a href="#/entries" data-nav="entries"><span>02</span>内容库</a>
          <a href="#/templates" data-nav="templates"><span>03</span>模板中心</a>
          <a href="#/timeline" data-nav="timeline"><span>04</span>时间线</a>
          <a href="#/relations" data-nav="relations"><span>05</span>关系网络</a>
          <a href="#/checks" data-nav="checks"><span>06</span>质量中心 <b id="check-badge"></b></a>
          <a href="#/transfer" data-nav="transfer"><span>07</span>迁移与发布</a>
          <a href="#/settings" data-nav="settings"><span>08</span>平台设置</a>
        </nav>
        <div class="sidebar-footer">
          <span><i class="status-mark" aria-hidden="true"></i><b id="vault-indicator">尚未打开世界库</b></span>
          <small>本机存储 / Markdown</small>
        </div>
      </aside>
      <button id="sidebar-scrim" class="sidebar-scrim" aria-label="关闭导航"></button>
      <div class="workspace">
        <header class="topbar">
          <button id="menu-button" class="icon-button mobile-only" aria-label="打开菜单"><i></i><i></i></button>
          <form id="global-search" class="search-bar">
            <span aria-hidden="true">⌕</span><input id="search-input" type="search" placeholder="搜索整个世界库" autocomplete="off">
            <kbd>/</kbd>
          </form>
          <a id="new-entry-button" class="button primary" href="#/new"><span>＋</span>新建条目</a>
        </header>
        <main id="content" tabindex="-1"><div class="loading">正在打开世界库……</div></main>
      </div>
    </div>
    <div id="toast-region" aria-live="polite"></div>
    <dialog id="action-dialog" class="action-dialog">
      <div class="dialog-frame">
        <header><span>确认操作</span><button id="dialog-close" class="icon-button" aria-label="关闭">×</button></header>
        <div class="dialog-body">
          <h2 id="dialog-title"></h2>
          <p id="dialog-message"></p>
          <label id="dialog-confirmation-field" class="field" hidden>
            <span id="dialog-confirmation-label"></span>
            <input id="dialog-confirmation" autocomplete="off">
          </label>
        </div>
        <footer>
          <button id="dialog-cancel" class="button">取消</button>
          <button id="dialog-confirm" class="button">确认</button>
        </footer>
      </div>
    </dialog>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
