<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Worldbuilding Wiki</title>
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="#/">
          <span class="brand-mark">W</span>
          <span><strong>Worldbuilding</strong><small>个人世界观工作台</small></span>
        </a>
        <nav aria-label="主要导航">
          <a href="#/" data-nav="home">总览</a>
          <a href="#/entries" data-nav="entries">全部条目</a>
          <a href="#/timeline" data-nav="timeline">时间线</a>
          <a href="#/checks" data-nav="checks">一致性检查 <span id="check-badge"></span></a>
          <a href="#/transfer" data-nav="transfer">迁移与审阅</a>
          <a href="#/settings" data-nav="settings">设置</a>
        </nav>
        <div class="sidebar-footer">
          <span id="vault-indicator">尚未打开世界库</span>
          <small>本地优先 · Markdown 真源</small>
        </div>
      </aside>
      <div class="workspace">
        <header class="topbar">
          <button id="menu-button" class="icon-button mobile-only" aria-label="打开菜单">☰</button>
          <form id="global-search" class="search-bar">
            <span>⌕</span><input id="search-input" type="search" placeholder="搜索标题、别名、正文或标签" autocomplete="off">
            <kbd>Enter</kbd>
          </form>
          <a id="new-entry-button" class="button primary" href="#/new">＋ 新建条目</a>
        </header>
        <main id="content" tabindex="-1"><div class="loading">正在打开世界库……</div></main>
      </div>
    </div>
    <div id="toast-region" aria-live="polite"></div>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
